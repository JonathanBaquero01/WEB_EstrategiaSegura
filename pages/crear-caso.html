<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Caso (Operador) - GestorFPQRS</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <div class="app-layout">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <button class="sidebar-toggle" id="sidebarToggle">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <aside class="sidebar" id="sidebar"></aside>
        
        <main class="main-content">
            <header class="top-header">
                <div class="page-title-section">
                    <h1 style="display: flex; align-items: center; gap: 10px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
                        Crear caso por operador
                    </h1>
                    <p>Registro interno de FPQRS con validacion de asociado</p>
                </div>
            </header>
            
            <div class="content-area">
                <!-- Wizard Steps -->
                <div class="wizard-steps">
                    <div class="wizard-step active">
                        <div class="step-circle">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </div>
                        <span class="step-label">Buscar asociado</span>
                    </div>
                    <div class="wizard-step">
                        <div class="step-circle">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </div>
                        <span class="step-label">Seleccionar asociado</span>
                    </div>
                    <div class="wizard-step">
                        <div class="step-circle">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        </div>
                        <span class="step-label">Registrar caso</span>
                    </div>
                    <div class="wizard-step">
                        <div class="step-circle">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        </div>
                        <span class="step-label">Confirmacion</span>
                    </div>
                </div>
                
                <!-- Validar Asociado Card -->
                <div class="card" style="max-width: 600px; margin: 0 auto;">
                    <div class="card-body" style="padding: 32px;">
                        <h3 style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 16px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            Validar asociado
                        </h3>
                        <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 24px;">Ingrese el numero de identificacion y/o correo electronico para buscar al asociado en el sistema.</p>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Numero de identificacion</label>
                                <div class="input-group">
                                    <svg class="input-group-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                    <input type="text" class="form-control" placeholder="Ej: 1082456789">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Correo electronico</label>
                                <div class="input-group">
                                    <svg class="input-group-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                                    <input type="email" class="form-control" placeholder="Ej: nombre@correo.com">
                                </div>
                            </div>
                        </div>
                        
                        <button class="btn btn-primary" style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            Validar asociado
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="../js/sidebar.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            SidebarModule.render('crear');
            SidebarModule.setupMobile();
        });
    </script>
</body>
</html>
